PROJECT_NAME="example-project"
PROJECT_DESCRIPTION="repository that is maintained by an autonomous Codex harness"

# Override this if the rules file lives elsewhere.
# RULES_FILE="${ROOT_DIR}/AGENTS.md"

# Override this if the plan file should live elsewhere.
# PLAN_PATH="${ROOT_DIR}/PLAN.md"

# High-level priorities shown to planner/worker/reviewer.
PRIMARY_PRIORITY="improve correctness first"
SECONDARY_PRIORITY="improve implementation quality, robustness, and maintainability second"
GENERAL_IMPROVEMENT_RULE="Never add one-off hacks when a general-purpose fix is possible."
ARCHITECTURE_GUIDANCE="Prefer the earliest correct layer in the pipeline and keep late rewrite for cleanup only."

# What counts as evidence for this project.
EVIDENCE_KIND="generated artifacts, test/sweep logs, and repository code state"
COMPARE_INPUT_DESCRIPTION="the relevant source inputs, generated outputs, test or sweep evidence, and the current code state"
SWEEP_LABEL="curated evidence sweep"

# Files to stage into the evidence subset directory before SWEEP_CMD runs.
# You can replace these with any repo-relative inputs that make sense for your project.
# If you do not override these, the harness will stay on the fallback curated
# COD evidence lane from `meta_harness/config.py`.
EVIDENCE_INPUT_FILES=(
  "cod/BIOSFUNC.COD"
  "cod/DOSFUNC.COD"
  "cod/OVERLAY.COD"
)

# The evidence command runs inside: timeout --foreground "${CODEX_TIMEOUT_SECS}s" bash -lc "${SWEEP_CMD} | tee ..."
# It can point at staged inputs under ${EVIDENCE_SUBSET_DIR}, or ignore them and use any other repo command.
SWEEP_TIMEOUT_SECS=20
SWEEP_SUBPROCESS_TIMEOUT_SECS=600
SWEEP_CMD="./.venv/bin/python -u scripts/decompile_cod_dir.py \"${EVIDENCE_SUBSET_DIR}\" --timeout ${SWEEP_TIMEOUT_SECS} --subprocess-timeout ${SWEEP_SUBPROCESS_TIMEOUT_SECS}"

# Example for a single-target binary sweep instead of the curated COD lane:
# SWEEP_LABEL="LIFE2 focused sweep"
# EVIDENCE_INPUT_FILES=(
#   "LIFE2.EXE"
#   "PLAN.md"
#   "README.md"
# )
# SWEEP_CMD="./.venv/bin/python -u decompile.py \"${ROOT_DIR}/LIFE2.EXE\" --timeout 6 --max-functions 8"

# Resource guardrails. Adjust per machine/project.
# MIN_FREE_DISK_MB=8192
# MIN_FREE_RAM_MB=4096
# PAUSE_WHEN_RAM_BELOW_MB=6144
# MAX_STATE_DIR_MB=12288
# MAX_SINGLE_ARTIFACT_MB=1024
# CODEX_MEMORY_LIMIT_MB=6144

# Token-saving prompt knobs. Enabled by default.
# COMPACT_PROMPTS=1
# DELTA_RESUME_PROMPTS=1

# Optional model overrides.
# LLM_PROVIDER="codex"
# PLANNER_PROVIDER="codex"
# CHECKER_PROVIDER="ollama"
# WORKER_PROVIDER="ollama"
# REVIEWER_PROVIDER="codex"
# CRASH_REVIEWER_PROVIDER="codex"
#
# For Ollama:
# OLLAMA_CMD="ollama"
# CHECKER_MODEL="qwen2.5-coder:14b"
# WORKER_MODEL="qwen2.5-coder:14b"
#
# For llama.cpp:
# LLAMACPP_CMD="llama-cli"
# WORKER_PROVIDER="llamacpp"
# WORKER_MODEL="/models/qwen2.5-coder-14b-instruct-q4_k_m.gguf"
# LLAMACPP_EXTRA_ARGS="--ctx-size 16384 --threads 8 --n-gpu-layers 99"
#
# Local-model safety rails:
# LOCAL_MODEL_MAX_RETRIES=2
# LOCAL_MODEL_MIN_OUTPUT_BYTES=120
# LOCAL_MODEL_FALLBACK_PROVIDER="codex"
# LOCAL_MODEL_FALLBACK_MODEL="gpt-5.4-mini"
#
# Default cost profile:
# - checker/worker/planner/reviewer use gpt-5.4-mini by default
# - crash-reviewer stays on gpt-5.4 by default because crash diagnosis is rarer and more subtle
#
# PLANNER_MODEL="gpt-5.4-mini"
# CHECKER_MODEL="gpt-5.4-mini"
# WORKER_MODEL="gpt-5.4-mini"
# REVIEWER_MODEL="gpt-5.4-mini"
# CRASH_REVIEWER_MODEL="gpt-5.4"
