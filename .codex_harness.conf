PROJECT_NAME="inertia-decompiler"
PROJECT_DESCRIPTION="angr-based decompiler for 16/32-bit x86 real-mode binaries"

SWEEP_LABEL="LIFE2 focused sweep"
EVIDENCE_KIND="LIFE2 decompilation outputs, focused logs, and repository code state"
PRIMARY_PRIORITY="raise LIFE2.EXE decompilation toward LIFE.EXE output quality while treating LIFE.EXE and LIFE2.EXE as the same code without helpers from LIFE.EXE"
SECONDARY_PRIORITY="recover roughly the same function count and comparable decompiled output for LIFE2.EXE as for LIFE.EXE, and prefer fully optimized output, but emit partially optimized decompiled functions instead of dropping to raw failure when a timeout happens"
GENERAL_IMPROVEMENT_RULE="Never add hacks specific to one source file or one sample; fixes must be general-purpose improvements, and for this repo treat LIFE.EXE as the same codebase oracle for LIFE2.EXE while never using LIFE.EXE as a source of helper metadata. If a plan item is explicitly blocked above local rewrite or reports unchanged local tree, worker may try it once per new local diff, then must route it to planner/reviewer instead of repeating the same blocked attempt."
REPO_STANDING_TASKS=$'Keep COD tail validation as an active harness task, not just direct decompile quality work.\nBefore planning, read the latest debug logs and COD tail-validation summaries/detail artifacts and use them to localize the failure family.\nRun and use COD tail-validation evidence when choosing planner and worker focus.\nPrefer fixing remaining COD tail-validation deltas and adding focused regression tests before re-enabling tail validation for general direct EXE decompile runs.'
COMPARE_INPUT_DESCRIPTION="LIFE2 direct decompilation outputs, focused harness logs, tail-validation summaries/detail artifacts, and the current code state, treating LIFE.EXE as the same program without helper metadata: compare behavior, recovered functions, and output quality against LIFE.EXE, but do not import or reuse LIFE.EXE helper metadata"
EVIDENCE_INPUT_FILES=$'LIFE2.EXE\nPLAN.md\nREADME.md'
SWEEP_TIMEOUT_SECS=20
SWEEP_SUBPROCESS_TIMEOUT_SECS=600
SWEEP_CMD="./.venv/bin/python -u decompile.py \"${ROOT_DIR}/LIFE2.EXE\" --timeout 6 --max-functions 8"
