PROJECT_NAME="inertia-decompiler"
PROJECT_DESCRIPTION="angr-based decompiler for 16/32-bit x86 real-mode binaries"

SWEEP_LABEL="LIFE2 focused sweep"
EVIDENCE_KIND="LIFE2 decompilation outputs, focused logs, and repository code state"
COMPARE_INPUT_DESCRIPTION="LIFE2 direct decompilation outputs, focused harness logs, and the current code state; LIFE.EXE may be compared only as offline oracle evidence"

EVIDENCE_INPUT_FILES=$'LIFE2.EXE\nPLAN.md\nREADME.md'
SWEEP_TIMEOUT_SECS=20
SWEEP_SUBPROCESS_TIMEOUT_SECS=600
SWEEP_CMD="./.venv/bin/python -u decompile.py \"${ROOT_DIR}/LIFE2.EXE\" --timeout 6 --max-functions 8"
