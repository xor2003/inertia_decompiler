PROJECT_NAME="inertia-decompiler"
PROJECT_DESCRIPTION="angr-based decompiler for 16/32-bit x86 real-mode binaries"

SWEEP_LABEL="SORTDEMO focused sweep"
EVIDENCE_KIND="SORTDEMO decompilation outputs, focused logs, and repository code state"
PRIMARY_PRIORITY="raise SORTDEMO.EXE decompilation quality by removing repeated failed function passes and replacing avoidable asm fallback with real recovered C"
SECONDARY_PRIORITY="emit stable whole-file compiler/library summaries for SORTDEMO.EXE and keep harness retries bounded, measurable, and evidence-driven"
GENERAL_IMPROVEMENT_RULE="Never add hacks specific to one source file or one sample; fixes must be general-purpose improvements. For this repo keep the live lane on SORTDEMO.EXE, prefer bounded --addr repros over broad sweeps while debugging a function family, and stop retrying a lane once it repeats the same failure family without new evidence."
REPO_STANDING_TASKS=$'Keep SORTDEMO.EXE as the live harness target until repeated function retries and current asm fallbacks are understood.\nBefore planning, read the latest SORTDEMO logs and use bounded --addr repros to localize the exact failure family.\nPrefer measured fixes that reduce repeated decompile attempts or improve emitted C for current SORTDEMO functions before broader cleanup.'
COMPARE_INPUT_DESCRIPTION="SORTDEMO direct decompilation outputs, focused harness logs, and the current code state: compare repeated function attempts, fallback families, and file-level compiler/library summaries against the current SORTDEMO baseline"
EVIDENCE_INPUT_FILES=$'SORTDEMO.EXE\nPLAN.md\nREADME.md'
SWEEP_TIMEOUT_SECS=20
SWEEP_SUBPROCESS_TIMEOUT_SECS=600
SWEEP_CMD="./.venv/bin/python -u decompile.py \"${ROOT_DIR}/SORTDEMO.EXE\" --timeout 6 --max-functions 8"
